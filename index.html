<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לימוד אנגלית - שלבים</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .game-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border: 4px solid #4a90e2; }
        .level-badge { background: #4a90e2; color: white; padding: 5px 15px; border-radius: 15px; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; }
        .image-display { font-size: 70px; margin: 15px 0; }
        .instruction { font-size: 1.2rem; color: #333; margin-bottom: 15px; font-weight: bold; }
        .speaker-btn { background: #ff9800; border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; margin-bottom: 20px; font-size: 30px; color: white; box-shadow: 0 4px #e68a00; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn { background: #fff; border: 2px solid #ddd; padding: 15px; font-size: 1.3rem; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .correct { background-color: #c8e6c9 !important; border-color: #4caf50 !important; }
        .wrong { background-color: #ffcdd2 !important; border-color: #f44336 !important; }
    </style>
</head>
<body>

<div class="game-card">
    <div id="levelDisplay" class="level-badge">שלב 1: התאמת תמונה</div>
    <div id="instruction" class="instruction">מה בתמונה?</div>
    <div id="imageDisplay" class="image-display">🚗</div>
    <button class="speaker-btn" onclick="playSound()">🔊</button>
    <div class="options" id="options"></div>
</div>

<script>
    // שלב 1: 5 שאלות של זיהוי
    const level1 = [
        { word: "Car", emoji: "🚗", options: ["Car", "Cat", "Cap", "Can"], correct: "Car" },
        { word: "Dog", emoji: "🐶", options: ["Dig", "Dog", "Dot", "Dad"], correct: "Dog" },
        { word: "Apple", emoji: "🍎", options: ["Ant", "Arm", "Apple", "Axe"], correct: "Apple" },
        { word: "Sun", emoji: "☀️", options: ["Sit", "Sun", "Sad", "Six"], correct: "Sun" },
        { word: "Ball", emoji: "⚽", options: ["Bell", "Ball", "Bill", "Bull"], correct: "Ball" }
    ];

    // שלב 2: מילים מתחרזות
    const level2 = [
        { word: "Cat", emoji: "🐈", options: ["Hat", "Dog", "Sun", "Big"], correct: "Hat", instruction: "מה מתחרז עם Cat?" },
        { word: "Cake", emoji: "🍰", options: ["Snake", "Ball", "Car", "Book"], correct: "Snake", instruction: "מה מתחרז עם Cake?" },
        { word: "Frog", emoji: "🐸", options: ["Dog", "Fish", "Blue", "Red"], correct: "Dog", instruction: "מה מתחרז עם Frog?" },
        { word: "Toy", emoji: "🧸", options: ["Boy", "Apple", "Sky", "Ten"], correct: "Boy", instruction: "מה מתחרז עם Toy?" },
        { word: "Moon", emoji: "🌙", options: ["Spoon", "Tree", "Pen", "Box"], correct: "Spoon", instruction: "מה מתחרז עם Moon?" }
    ];

    let currentLevel = 1;
    let currentIdx = 0;
    let questions = level1;

    function playSound() {
        const utterance = new SpeechSynthesisUtterance(questions[currentIdx].word);
        utterance.lang = 'en-US';
        utterance.rate = 0.7;
        window.speechSynthesis.speak(utterance);
    }

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('levelDisplay').innerText = `שלב ${currentLevel}`;
        document.getElementById('instruction').innerText = q.instruction || "מה שמעתם בתמונה?";
        document.getElementById('imageDisplay').innerText = q.emoji;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const correct = questions[currentIdx].correct;
        if (selected === correct) {
            btn.classList.add('correct');
            setTimeout(nextQuestion, 1000);
        } else {
            btn.classList.add('wrong');
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else if (currentLevel === 1) {
            // מעבר לשלב 2
            currentLevel = 2;
            currentIdx = 0;
            questions = level2;
            alert("כל הכבוד! עוברים לשלב המילים המתחרזות!");
            loadQuestion();
        } else {
            document.querySelector('.game-card').innerHTML = "<h1>סיימת את כל השלבים! 🎉</h1><button onclick='location.reload()'>שחק שוב</button>";
        }
    }

    loadQuestion();
</script>
</body>
</html>
