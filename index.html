<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק צלילים באנגלית - כיתה ג'</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffefba; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .game-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border: 4px solid #ffcb05; }
        h1 { color: #2a75bb; font-size: 1.8rem; margin-top: 0; }
        .speaker-btn { background: #4caf50; border: none; border-radius: 50%; width: 80px; height: 80px; cursor: pointer; margin-bottom: 20px; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .speaker-btn:hover { transform: scale(1.1); }
        .speaker-btn:active { transform: scale(0.9); }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option-btn { background: #f0f0f0; border: 3px solid #ddd; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.2s; color: #333; }
        .option-btn:hover { background: #e0e0e0; border-color: #bbb; }
        .correct { background-color: #a5d6a7 !important; border-color: #4caf50 !important; color: #1b5e20; }
        .wrong { background-color: #ef9a9a !important; border-color: #f44336 !important; color: #b71c1c; }
        .score { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>הקשיבו ובחרו את המילה!</h1>
        
        <!-- כפתור הרמקול -->
        <button class="speaker-btn" onclick="playSound()" title="לחצו לשמיעת הצליל">
            <span style="font-size: 40px; color: white;">🔊</span>
        </button>

        <div class="options" id="options">
            <!-- כאן יופיעו הכפתורים -->
        </div>

        <div class="score" id="scoreDisplay">נקודות: 0</div>
    </div>

    <script>
        const words = [
            { word: "Car", options: ["Car", "Cat", "Cap", "Can"] },
            { word: "Dog", options: ["Dig", "Dog", "Dot", "Dad"] },
            { word: "Blue", options: ["Black", "Ball", "Blue", "Bell"] },
            { word: "Sun", options: ["Sit", "Sun", "Sad", "Six"] },
            { word: "Apple", options: ["Ant", "Arm", "Apple", "Axe"] }
        ];

        let currentIdx = 0;
        let score = 0;

        function playSound() {
            const utterance = new SpeechSynthesisUtterance(words[currentIdx].word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8; // מהירות מעט איטית יותר לילדים
            window.speechSynthesis.speak(utterance);
        }

        function loadQuestion() {
            const current = words[currentIdx];
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            // ערבוב האופציות
            const shuffledOptions = [...current.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const correct = words[currentIdx].word;
            if (selected === correct) {
                btn.classList.add('correct');
                score += 10;
                document.getElementById('scoreDisplay').innerText = `נקודות: ${score}`;
                setTimeout(nextQuestion, 1000);
            } else {
                btn.classList.add('wrong');
                // מאפשר לנסות שוב
            }
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < words.length) {
                loadQuestion();
            } else {
                document.querySelector('.game-card').innerHTML = `
                    <h1>כל הכבוד! 🌟</h1>
                    <p style="font-size: 1.5rem;">סיימתם עם ${score} נקודות!</p>
                    <button onclick="location.reload()" style="padding: 10px 20px; font-size: 1rem; border-radius: 10px; cursor: pointer;">שחק שוב</button>
                `;
            }
        }

        // התחלת המשחק
        loadQuestion();
    </script>
</body>
</html>
